name: AWS CI
'on':
  push:
    branches:
      - main
permissions:
  contents: read
  packages: write
  security-events: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build Docker Image
        run: docker build -t ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }} -t ${{ steps.login-ecr.outputs.registry }}/backend:latest .
      - name: Push to AWS ECR
        run: docker push ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }} && docker push ${{ steps.login-ecr.outputs.registry }}/backend:latest

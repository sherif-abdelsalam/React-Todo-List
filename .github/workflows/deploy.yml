'on':
  push:
    branches:
      - null
permissions:
  contents: read
  packages: write
  security-events: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/undefined:${{ github.sha }} -t ${{ secrets.DOCKER_HUB_USERNAME }}/undefined:latest .
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/undefined:${{ github.sha }} && docker push ${{ secrets.DOCKER_HUB_USERNAME }}/undefined:latest
